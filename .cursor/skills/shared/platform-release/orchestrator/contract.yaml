name: release-app-orchestrator
purpose: Ship to main with preflight, git push, mandatory Render deploy poll, smoke check, report
inputs:
  domain:
    required: false
    default: production
  intent:
    required: false
outputs:
  commit_sha:
    type: string
  deploy_status:
    type: string
  deploy_id:
    type: string
  smoke_http_code:
    type: number
  report:
    type: markdown
success_criteria:
  - pnpm typecheck passed
  - git push to main succeeded (or HEAD already on remote)
  - render deploy reached live for commit_sha
  - smoke check returned 200
failure_conditions:
  - typecheck failed
  - git push failed
  - wave 2 started before commit_sha known
  - render build_failed or poll timeout
  - smoke check not 200
dependencies:
  skills: [platform-release, testing, verification, reporting]
  policies: [master-rules, mcp-and-deploy]
verification:
  - typecheck_passed
  - git_pushed
  - render_polled_until_live
  - smoke_200
