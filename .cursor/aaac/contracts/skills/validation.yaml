name: validation
purpose: Confidence and complexity gates before execute (mutating verbs)
applies_to_verbs: [create, update, fix]
outputs:
  validation:
    type: enum
    values: [pass, fail]
    required: true
  scores:
    type: object
    required: true
  complexity:
    type: object
    required_for_verbs: [create, update, fix]
    fields:
      score: number
      threshold: number
      pass: boolean
  clarification_questions:
    type: list
    required_when: validation fail
gate: true
