version: 1

# AAAC execution graph — SSOT for command → orchestrator → skills → agents.
# Regenerate: pnpm aaac:generate (or npx @ludecker/aaac generate)
# Path convention: agents/, policies/, skills/, domains/ are relative to .cursor/
# Ontology: .cursor/aaac/ontology.json — layers (code → data → product → system):
#   code: function, component, module
#   data: schema, model, migration
#   product: feature, workflow, integration
#   system: app, domain, architecture

verbs: [create, update, fix, review, check, test, release, remove]
objects: [function, component, module, schema, model, migration, feature, workflow, integration, app, domain, architecture]

invalid_pairs:
  - [release, function]
  - [release, component]
  - [release, module]
  - [release, schema]
  - [release, model]
  - [release, migration]
  - [release, workflow]
  - [release, architecture]
  - [release, domain]

verb_work_phases:
  create: [discover, investigate_lite, plan, execute, test_execute, verify, review_swarm, report]
  update: [discover, investigate_lite, plan, execute, test_execute, verify, review_swarm, report]
  fix: [discover, investigate_swarm, root_cause, plan, execute, test_execute, verify, review_swarm, report]
  review: [discover, plan, report]
  check: [discover, report]
  test: [discover, plan, verify, report]
  release: [execute, verify, report]
  remove: [discover, investigate_lite, plan, execute, test_execute, verify, review_swarm, report]

verb_gate_stack:
  create: pre_execute
  update: pre_execute
  fix: pre_execute
  review: null
  check: pre_execute_minimal
  test: null
  release: release
  remove: pre_execute

governance_gate_stacks:
  pre_execute: [validate, impact_analysis, dependency_graph, fitness_functions, rollback]
  pre_execute_minimal: [validate, impact_analysis, dependency_graph, fitness_functions]
  release: [validate]

# Composed runtime: work through plan + gate stack + execute onward (see lifecycle.json runtime_compose)
verb_runtime:
  create: [discover, investigate_lite, plan, validate, impact_analysis, dependency_graph, fitness_functions, rollback, execute, test_execute, verify, review_swarm, report]
  update: [discover, investigate_lite, plan, validate, impact_analysis, dependency_graph, fitness_functions, rollback, execute, test_execute, verify, review_swarm, report]
  fix: [discover, investigate_swarm, root_cause, plan, validate, impact_analysis, dependency_graph, fitness_functions, rollback, execute, test_execute, verify, review_swarm, report]
  review: [discover, plan, report]
  check: [discover, validate, impact_analysis, dependency_graph, fitness_functions, report]
  test: [discover, plan, verify, report]
  release: [validate, execute, verify, report]
  remove: [discover, investigate_lite, plan, validate, impact_analysis, dependency_graph, fitness_functions, rollback, execute, test_execute, verify, review_swarm, report]

# Exception commands — not verb×object; use for Run.pending when command matches
command_workflows:
  write-article: [parse, research_swarm, write, review, persist, report]
  fix-module: [discover, investigate_swarm, root_cause, plan, validate, impact_analysis, dependency_graph, fitness_functions, rollback, execute, test_execute, verify, review_swarm, report]
  fix-bug: [discover, investigate_swarm, root_cause, plan, validate, impact_analysis, dependency_graph, fitness_functions, rollback, execute, test_execute, verify, review_swarm, report]

confidence:
  architecture: 0.9
  requirements: 0.8
  scope: 0.8

object_maturity:
  function: evolving
  component: evolving
  module: critical
  schema: protected
  model: critical
  migration: protected
  feature: stable
  workflow: stable
  integration: critical
  app: critical
  domain: critical
  architecture: protected

maturity_rules:
  protected:
    requires_phases:
      - impact_analysis
      - dependency_graph
      - rollback
    investigation: lite_on_create_update_deep_on_fix
  critical:
    requires_phases:
      - impact_analysis
      - dependency_graph
    investigation: lite_on_create_update_deep_on_fix
  stable:
    requires_phases:
      - impact_analysis
    investigation: lite_on_create_update_deep_on_fix
  evolving:
    requires_phases:
      []
    investigation: lite_on_create_update_deep_on_fix

# Layer SSOT refs (see aaac/layers.md)
lifecycle: aaac/lifecycle/lifecycle.json
lifecycle_phases: aaac/lifecycle/phases.json
governance_gates: aaac/governance/gates.json
complexity: aaac/complexity.yaml
run: aaac/run/schema.json
capabilities: aaac/capabilities/registry.json
dependencies: aaac/dependencies.yaml
fitness_functions: aaac/fitness-functions.yaml
