resolvers:
  update-module-by-slug:
    map:
      cms: cms-update
      ui: ui-update
      database: database-update
      aaac: aaac-update
  update-component-by-scope:
    map:
      cms: cms-design-update
      ui: ui-design-update
  create-feature-by-slug:
    map:
      cms: cms-create-feature
      aaac: aaac-create-feature
  fix-bug-by-slug:
    map:
      cms: cms-fix-bug
      ui: ui-fix-bug
      database: database-fix-bug
      aaac: aaac-fix-bug
    default: verb-fix
    default_object: feature
  fix-domain-by-slug:
    map:
      cms: cms-fix-bug
      ui: ui-fix-bug
      database: database-fix-bug
      aaac: aaac-fix-bug
    default: verb-fix
    default_object: module
  fix-component-by-scope:
    map:
      cms: cms-fix-bug
      ui: ui-fix-bug
    default: verb-fix
    default_object: component
  fix-data-by-slug:
    map:
      database: database-fix-bug
    default: database-fix-bug
    default_object: schema
  fix-integration-by-slug:
    map:
      cms: cms-fix-bug
      ui: ui-fix-bug
      database: database-fix-bug
      aaac: aaac-fix-bug
    default: verb-fix
    default_object: integration
  test-module-by-slug:
    map:
      cms: cms-test-module
      ui: ui-test-module
      database: database-test-module
      aaac: aaac-test-module

