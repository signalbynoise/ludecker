check:
  description: Check verbs — readonly discover → gates → report (no execute).
  phases:
    - discover
    - validate
    - impact_analysis
    - dependency_graph
    - fitness_functions
    - report
  swarm_minimums:
    discover: 4
    check_swarm: 3
  expected_events:
    discover:
      - command_parsed
      - run_created
      - graph_resolved
      - phase_start
      - agent_spawned
      - phase_complete
    validate:
      - phase_start
      - gate_pass
      - phase_complete
    report:
      - phase_start
      - skill_loaded
      - phase_complete
  readonly: true
  notes: >-
    Orchestrator runs check_swarm (3 explore agents) during discover.
    Edits always denied — no execute phase.
