# AAAC verb-specific debug profiles — expected phases and log events

version: 1

create:
  description: Create verbs — discover → investigate_lite → plan → gates → execute → verify → report.
  phases:
    - discover
    - investigate_lite
    - plan
    - validate
    - impact_analysis
    - dependency_graph
    - fitness_functions
    - rollback
    - execute
    - verify
    - report
  swarm_minimums:
    discover: 4
  expected_events:
    discover:
      - command_parsed
      - run_created
      - graph_resolved
      - phase_start
      - agent_spawned
      - phase_complete
    investigate_lite:
      - phase_start
      - skill_loaded
      - phase_complete
    plan:
      - phase_start
      - skill_loaded
      - phase_complete
    validate:
      - phase_start
      - gate_pass
      - phase_complete
    execute:
      - phase_start
      - execute_start
      - edit_allowed
      - execute_complete
      - phase_complete

